events {}

http {
    include /etc/nginx/mime.types; # <--- ADD THIS LINE
    default_type application/octet-stream;

    upstream django {
        server web:8000;
    }

    server {
        listen 80;
        server_name blog.manojbhandarkar.cloud;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name blog.manojbhandarkar.cloud;

        ssl_certificate /etc/letsencrypt/live/blog.manojbhandarkar.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/blog.manojbhandarkar.cloud/privkey.pem;

        client_max_body_size 20M;

        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            alias /app/staticfiles/;
            autoindex on;
        }

        location /media/ {
            alias /app/media/;
            autoindex on;
        }
    }
}