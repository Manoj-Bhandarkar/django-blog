{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Django Blog</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #ffc107;
        }

        .title {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .description {
            font-size: 16px;
            color: #ddd;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 25px;
            background: #ffc107;
            color: #000;
            font-weight: 500;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn-home:hover {
            background: #e0a800;
            transform: translateY(-2px);
        }

        .illustration {
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 80px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Optional Illustration -->
    <div class="illustration">
        <img src="{% static 'images/404.svg' %}" alt="404" width="200">
    </div>

    <div class="error-code">404</div>

    <div class="title">Oops! Page Not Found</div>

    <div class="description">
        The page you're looking for doesn’t exist or has been moved.<br>
        Try going back to the homepage.
    </div>

    <a href="{% url 'home' %}" class="btn-home">
        ⬅ Back to Home
    </a>

</div>

</body>
</html>
