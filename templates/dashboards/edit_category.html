{% extends 'base.html' %}
{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    <!-- Left Sidebar -->
    <!-- Load the sidebar here -->
    {% include 'dashboards/sidebar.html' %}
    <div class="col-md-9">
        <h2>Edit Category</h2>

        <form method="post" action="{% url 'edit_category' category.pk %}">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-warning">Update Category</button>
        </form>
    </div>
</div>
{% endblock %}
