
{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}
    <div class="login-container" style="width: 500px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);">
        <h2>Login</h2>
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-warning">Login</button>
        </form>
    </div>  
{% endblock %}
